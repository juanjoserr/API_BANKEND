version: '3.8'

services:
  # Servicio Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST:-db4free.net}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password123}
      - DB_NAME=${DB_NAME:-api_backend}
      - DB_PORT=${DB_PORT:-3306}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_this_in_production}
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - mysql-init
    networks:
      - api-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Servicio MySQL (OPCIONAL - para desarrollo local)
  # Si usas db4free.net, comenta o elimina esta sección
  mysql-init:
    image: mysql:8.0
    container_name: api-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password123}
      MYSQL_DATABASE: ${DB_NAME:-api_backend}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - api-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
    driver: local

networks:
  api-network:
    driver: bridge
