<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Backend Visualización</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
    h1, h2 { color: #333; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,.08); }
    .box { margin-bottom: 20px; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
    label { display: block; margin: 8px 0 4px; font-weight: bold; }
    input, select, textarea, button { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { cursor: pointer; background: #007bff; color: #fff; border: none; }
    button.secondary { background: #444; }
    pre { background: #222; color: #f8f8f8; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .row { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
    .full { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Visualización de API Backend</h1>
    <p>Usa este panel para registrar, iniciar sesión y ver tus items protegidos.</p>

    <div class="box row">
      <div>
        <h2>Registro</h2>
        <label>Email</label>
        <input id="registerEmail" type="email" placeholder="usuario@ejemplo.com" />
        <label>Contraseña</label>
        <input id="registerPassword" type="password" placeholder="123456" />
        <label>Confirmar contraseña</label>
        <input id="registerConfirm" type="password" placeholder="123456" />
        <button id="btnRegister">Registrar usuario</button>
      </div>
      <div>
        <h2>Login</h2>
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="usuario@ejemplo.com" />
        <label>Contraseña</label>
        <input id="loginPassword" type="password" placeholder="123456" />
        <button id="btnLogin">Iniciar sesión</button>
      </div>
    </div>

    <div class="box">
      <h2>Token JWT</h2>
      <textarea id="tokenOutput" rows="3" readonly placeholder="Aquí aparecerá el token después del login..."></textarea>
      <button id="btnLogout" class="secondary">Cerrar sesión</button>
    </div>

    <div class="box row">
      <div>
        <h2>Crear item</h2>
        <label>Nombre</label>
        <input id="itemName" type="text" placeholder="Nombre del item" />
        <label>Descripción</label>
        <textarea id="itemDescription" rows="3" placeholder="Descripción"></textarea>
        <label>Estado</label>
        <select id="itemState">
          <option value="activo">activo</option>
          <option value="inactivo">inactivo</option>
          <option value="pendiente">pendiente</option>
        </select>
        <label>Precio</label>
        <input id="itemPrice" type="number" step="0.01" min="0" placeholder="0.00" />
        <label>Stock</label>
        <input id="itemStock" type="number" min="0" placeholder="0" />
        <label>Categoría</label>
        <input id="itemCategory" type="text" placeholder="general" />
        <button id="btnCreateItem">Crear item</button>
      </div>
      <div>
        <h2>Acciones</h2>
        <button id="btnGetItems">Ver items</button>
        <button id="btnClearLog" class="secondary">Limpiar historial</button>
      </div>
    </div>

    <div class="box full">
      <h2>Historial / Respuestas</h2>
      <pre id="log">Esperando acción...</pre>
    </div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const tokenEl = document.getElementById('tokenOutput');

    const writeLog = (text) => {
      const now = new Date().toLocaleTimeString();
      logEl.textContent = `${now} - ${text}\n${logEl.textContent}`;
    };

    const getToken = () => tokenEl.value.trim();
    const setToken = (token) => { tokenEl.value = token; };

    const handleResponse = async (response) => {
      const data = await response.json().catch(() => ({}));
      writeLog(`${response.status} ${response.statusText} -> ${JSON.stringify(data, null, 2)}`);
      return data;
    };

    document.getElementById('btnRegister').addEventListener('click', async () => {
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirm').value;
      const response = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, confirmPassword })
      });
      await handleResponse(response);
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const response = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await handleResponse(response);
      if (data.token) {
        setToken(data.token);
      }
    });

    document.getElementById('btnCreateItem').addEventListener('click', async () => {
      const token = getToken();
      if (!token) return writeLog('Necesitas iniciar sesión primero');
      const nombre = document.getElementById('itemName').value;
      const descripcion = document.getElementById('itemDescription').value;
      const estado = document.getElementById('itemState').value;
      const price = document.getElementById('itemPrice').value;
      const stock = document.getElementById('itemStock').value;
      const categoria = document.getElementById('itemCategory').value;
      const response = await fetch('/api/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ nombre, descripcion, estado, price, stock, categoria })
      });
      await handleResponse(response);
    });

    document.getElementById('btnGetItems').addEventListener('click', async () => {
      const token = getToken();
      if (!token) return writeLog('Necesitas iniciar sesión primero');
      const response = await fetch('/api/items', {
        headers: { Authorization: `Bearer ${token}` }
      });
      await handleResponse(response);
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
      setToken('');
      writeLog('Sesión cerrada');
    });

    document.getElementById('btnClearLog').addEventListener('click', () => {
      logEl.textContent = 'Historial limpiado.';
    });
  </script>
</body>
</html>
